<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>うどんを探せ！</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  margin:0;
  overflow:hidden;
  background:#111;
  color:white;
  font-family:sans-serif;
  touch-action:none;
}

h1{
  text-align:center;
  margin:10px 0;
  font-size:28px;
  letter-spacing:2px;
}
#game{
  width:100vw;
  max-width:100vw;

  display:grid;

  grid-template-columns:repeat(3,1fr);

  gap:6px;

  padding:6px;
}
.card{
  position:relative;
  aspect-ratio:1/1;
  overflow:hidden;
  border-radius:10px;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.effect{
  position:absolute;
  width:55%;
  height:55%;
  object-fit:contain;

  left:50%;
  top:50%;

  transform:translate(-50%,-50%);

  pointer-events:none;
  animation:pop 0.4s ease;
  z-index:10;
}
@keyframes pop{
  0%{
    transform:scale(0.3);
    opacity:0;
  }
  100%{
    transform:scale(1);
    opacity:1;
  }
}

#bottomUI{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:12px 0;
  border-top:1px solid #333;
  backdrop-filter:blur(8px);
}

.uiBox{
  text-align:center;
}

.label{
  font-size:12px;
  color:#999;
  letter-spacing:1px;
}

.value{
  font-size:28px;
  font-weight:bold;
}

button{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  padding:16px 36px;
  font-size:24px;
  border:none;
  border-radius:14px;
  background:#00aaff;
  color:white;
  z-index:100;
}

#result{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:34px;
  z-index:90;
  text-align:center;
}
</style>
</head>

<body>

<h1>うどんを探せ！</h1>

<div id="game"></div>

<div id="bottomUI">
  <div class="uiBox">
    <div class="label">SCORE</div>
    <div class="value" id="score">0</div>
  </div>

  <div class="uiBox">
    <div class="label">TIME</div>
    <div class="value" id="time">60</div>
  </div>
</div>

<div id="result"></div>

<button id="startBtn">START</button>

<audio id="bgm" src="bgm.mp3" loop></audio>
<audio id="maruSE" src="maru.mp3"></audio>
<audio id="batuSE" src="batu.mp3"></audio>
<audio id="endSE" src="end.mp3"></audio>

<script>
const normalImages = ["man1.jpg","woman1.jpg"];
const wrongImages = ["man2.jpg","woman2.jpg"];

let score = 0;
let time = 60;
let timer;
let playing = false;

const game = document.getElementById("game");

function createEffect(type, parent){

  const effect = document.createElement("img");

  effect.src = type === "maru"
    ? "maru.png"
    : "batu.png";

  effect.className = "effect";

  parent.appendChild(effect);

  setTimeout(()=>{
    effect.remove();
  },400);
}

function shuffleGame(){

  game.innerHTML = "";

  // 3x3なので9枚
  const totalCards = 9;

  const correctIndex =
    Math.floor(Math.random()*totalCards);

  for(let i=0;i<totalCards;i++){

    const card =
      document.createElement("div");

    card.className = "card";

    const img =
      document.createElement("img");

    if(i === correctIndex){

      img.src =
        wrongImages[
          Math.floor(Math.random()*2)
        ];

      card.onclick = ()=>{

        if(!playing) return;

        score++;

        document.getElementById("score")
        .textContent = score;

        createEffect("maru",card);

        document.getElementById("maruSE")
        .currentTime = 0;

        document.getElementById("maruSE")
        .play();

        setTimeout(()=>{
          shuffleGame();
        },120);
      };

    }else{

      img.src =
        normalImages[
          Math.floor(Math.random()*2)
        ];

      card.onclick = ()=>{

        if(!playing) return;

        createEffect("batu",card);

        document.getElementById("batuSE")
        .currentTime = 0;

        document.getElementById("batuSE")
        .play();
      };
    }

    card.appendChild(img);
    game.appendChild(card);
  }
}

function endGame(){

  playing = false;

  clearInterval(timer);

  document.getElementById("bgm").pause();

  document.getElementById("endSE").play();

  document.getElementById("result")
  .innerHTML =
  `TIME UP<br>スコア ${score}`;

  const btn =
    document.getElementById("startBtn");

  btn.innerText = "RESTART";
  btn.style.display = "block";
}

function startGame(){

  score = 0;
  time = 60;
  playing = true;

  document.getElementById("score")
  .textContent = score;

  document.getElementById("time")
  .textContent = time;

  document.getElementById("result")
  .innerHTML = "";

  document.getElementById("startBtn")
  .style.display = "none";

  const bgm =
    document.getElementById("bgm");

  bgm.currentTime = 0;
  bgm.play();

  shuffleGame();

  timer = setInterval(()=>{

    time--;

    document.getElementById("time")
    .textContent = time;

    if(time <= 0){
      endGame();
    }

  },1000);
}

document
.getElementById("startBtn")
.onclick = startGame;
</script>

</body>
</html>
