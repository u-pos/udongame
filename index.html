<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>うどんを探せ！</title>

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  overflow:hidden;
  background:#111;
  color:white;
  font-family:sans-serif;
  touch-action:none;
}

h1{
  text-align:center;
  margin:10px 0 6px 0;
  font-size:30px;
  letter-spacing:2px;
}

#topButtons{

  display:flex;

  justify-content:center;

  gap:12px;

  margin-bottom:8px;
}

.controlBtn{

  background:#222;

  color:white;

  border:none;

  border-radius:12px;

  padding:12px 18px;

  font-size:18px;
}

#game{

  width:100vw;

  display:grid;

  grid-template-columns:repeat(3,1fr);

  gap:6px;

  padding:6px;
}

.card{

  position:relative;

  aspect-ratio:1/1;

  overflow:hidden;

  border-radius:12px;
}

.card img{

  width:100%;

  height:100%;

  object-fit:cover;

  display:block;
}

.effect{

  position:absolute;

  inset:0;

  width:45%;

  height:45%;

  margin:auto;

  object-fit:contain;

  pointer-events:none;

  animation:pop 0.25s ease;

  z-index:30;
}

@keyframes pop{

  0%{
    transform:scale(0.3);
    opacity:0;
  }

  100%{
    transform:scale(1);
    opacity:1;
  }
}

#bottomUI{

  position:fixed;

  bottom:0;

  left:0;

  width:100%;

  background:rgba(0,0,0,0.94);

  border-top:1px solid #333;

  padding:6px 0 8px 0;
}

#timeArea{

  text-align:center;

  margin-bottom:10px;
}

#timeLabel{

  font-size:14px;

  color:#888;
}

#timeValue{

  font-size:34px;

  font-weight:bold;
}

#scoreArea{

  display:flex;

  justify-content:center;

  gap:18px;
}

.scoreBox{

  width:140px;

  background:#1c1c1c;

  border-radius:10px;

  padding:6px 0;

  text-align:center;

  border:1px solid #333;
}

.scoreLabel{

  font-size:11px;

  color:#888;

  margin-bottom:2px;

  line-height:1.1;
}

.scoreValue{

  font-size:22px;

  font-weight:bold;

  line-height:1;
}

#startBtn{

  position:fixed;

  left:50%;

  top:50%;

  transform:translate(-50%,-50%);

  z-index:100;

  padding:18px 46px;

  font-size:28px;

  border:none;

  border-radius:16px;

  background:#00aaff;

  color:white;
}

</style>
</head>

<body>

<h1>うどんを探せ！</h1>

<div id="topButtons">

  <button class="controlBtn"
  id="muteBtn">
    ミュート
  </button>

  <button class="controlBtn"
  id="retryBtn">
    やり直す
  </button>

</div>

<div id="game"></div>

<div id="bottomUI">

  <div id="timeArea">

    <div id="timeLabel">
      残り時間
    </div>

    <div id="timeValue">
      <span id="time">60</span>秒
    </div>

  </div>

  <div id="scoreArea">

    <div class="scoreBox">

      <div class="scoreLabel">
        SCORE
      </div>

      <div class="scoreValue"
      id="score">
        0
      </div>

    </div>

    <div class="scoreBox">

      <div class="scoreLabel">
        HIGH SCORE
      </div>

      <div class="scoreValue"
      id="highScore">
        0
      </div>

    </div>

  </div>

</div>

<button id="startBtn">
START
</button>

<audio id="bgm"
src="bgm.mp3"
loop></audio>

<audio id="maruSE"
src="maru.mp3"></audio>

<audio id="batuSE"
src="batu.mp3"></audio>

<audio id="endSE"
src="end.mp3"></audio>

<script>

let highScore =
Number(
localStorage.getItem(
"udonHighScore"
)) || 0;

document
.getElementById("highScore")
.textContent = highScore;

let muted = false;

const normalImages = [
"man1.jpg",
"woman1.jpg"
];

const wrongImages = [
"man2.jpg",
"woman2.jpg"
];

let score = 0;
let time = 60;
let timer;
let playing = false;

const game =
document.getElementById("game");

function createEffect(type,parent){

  const effect =
  document.createElement("img");

  effect.src =
  type === "maru"
  ? "maru.png"
  : "batu.png";

  effect.className = "effect";

  parent.appendChild(effect);

  setTimeout(()=>{

    effect.remove();

  },250);
}

function shuffleGame(){

  game.innerHTML = "";

  const totalCards = 9;

  const correctIndex =
  Math.floor(
    Math.random()*totalCards
  );

  for(let i=0;i<totalCards;i++){

    const card =
    document.createElement("div");

    card.className = "card";

    const img =
    document.createElement("img");

    if(i === correctIndex){

      img.src =
      wrongImages[
        Math.floor(Math.random()*2)
      ];

      card.onclick = ()=>{

        if(!playing) return;

        score++;

        document
        .getElementById("score")
        .textContent = score;

        if(score > highScore){

          highScore = score;

          localStorage.setItem(
            "udonHighScore",
            highScore
          );

          document
          .getElementById("highScore")
          .textContent = highScore;
        }

        createEffect("maru",card);

        if(!muted){

          const se =
          document.getElementById("maruSE");

          se.currentTime = 0;
          se.play();
        }

        setTimeout(()=>{

          shuffleGame();

        },120);
      };

    }else{

      img.src =
      normalImages[
        Math.floor(Math.random()*2)
      ];

      card.onclick = ()=>{

        if(!playing) return;

        createEffect("batu",card);

        if(!muted){

          const se =
          document.getElementById("batuSE");

          se.currentTime = 0;
          se.play();
        }
      };
    }

    card.appendChild(img);

    game.appendChild(card);
  }
}

function endGame(){

  playing = false;

  clearInterval(timer);

  document
  .getElementById("bgm")
  .pause();

  if(!muted){

    document
    .getElementById("endSE")
    .play();
  }

  document
  .getElementById("startBtn")
  .innerText = "RESTART";

  document
  .getElementById("startBtn")
  .style.display = "block";
}

function startGame(){

  clearInterval(timer);

  score = 0;
  time = 60;

  playing = true;

  document
  .getElementById("score")
  .textContent = score;

  document
  .getElementById("time")
  .textContent = time;

  document
  .getElementById("startBtn")
  .style.display = "none";

  const bgm =
  document.getElementById("bgm");

  bgm.currentTime = 0;

  if(!muted){
    bgm.play();
  }

  shuffleGame();

  timer = setInterval(()=>{

    time--;

    document
    .getElementById("time")
    .textContent = time;

    if(time <= 0){

      endGame();
    }

  },1000);
}

document
.getElementById("startBtn")
.onclick = startGame;

document
.getElementById("muteBtn")
.onclick = ()=>{

  muted = !muted;

  document
  .getElementById("muteBtn")
  .innerText =
  muted
  ? "ミュート解除"
  : "ミュート";

  const audios =
  document.querySelectorAll("audio");

  audios.forEach(a=>{

    a.muted = muted;
  });
};

document
.getElementById("retryBtn")
.onclick = ()=>{

  clearInterval(timer);

  startGame();
};

</script>

</body>
</html>
